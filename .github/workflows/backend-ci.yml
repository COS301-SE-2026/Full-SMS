name: Backend CI

on:
    push:
      branches: [ develop, main, chore/github-actions-ci-cd ]
      paths:
        - 'api/**'
        - '.github/workflows/backend-ci.yml'
    pull_request:
      branches: [ develop, main, chore/github-actions-ci-cd ]
      paths:
        - 'api/**'
        - '.github/workflows/backend-ci.yml'

jobs:
    lint-and-test:
      runs-on: ubuntu-latest

      steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r api/requirements.txt
          pip install flake8 pytest pytest-cov

      - name: Lint with flake8
        run: |
          # Stop build if there are Python syntax errors or undefined names
          flake8 api --exclude api/legacy --count --select=E9,F63,F7,F82 --show-source --statistics
          # Exit-zero treats all errors as warnings
          flake8 api --exclude api/legacy --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Run tests with pytest
        run: |
          pytest api/tests/ -v --cov=api --cov-report=term-missing
        continue-on-error: true
